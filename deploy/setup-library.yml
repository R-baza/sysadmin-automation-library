---
- name: Deploy and Configure Sysadmin Automation Library
  hosts: local
  become: yes  # Runs tasks requiring sudo permissions

  vars:
    library_path: "/home/atlas-01/sysadmin-automation-library"
    user_name: "atlas-01"

  tasks:
    - name: Ensure system and Python dependencies are installed via apt
      apt:
        name:
          - python3
          - python3-pip
          - python3-venv
          - git
          - python3-psutil    # Safe system-level package
          - python3-dotenv    # Safe system-level package
        state: present
        update_cache: yes

    - name: Create local .env file if it does not exist
      copy:
        content: 'DISCORD_WEBHOOK_URL="PLACEHOLDER_INSERT_YOUR_WEBHOOK_HERE"'
        dest: "{{ library_path }}/.env"
        owner: "{{ user_name }}"
        group: "{{ user_name }}"
        mode: '0600'  # Secure permissions (read/write only by owner)
        force: no     # If .env already exists, do not overwrite it!

    - name: Configure Cron Job - Host Intrusion Alerting (server_audit.py)
      cron:
        name: "Host Intrusion Alerting Audit"
        user: "{{ user_name }}"
        minute: "0"
        job: "/usr/bin/python3 {{ library_path }}/security/server_audit.py"

    - name: Configure Cron Job - Auth Log Pipeline (log_reporter.py)
      cron:
        name: "Daily Authentication Intrusion Log Pipeline"
        user: "{{ user_name }}"
        hour: "0"
        minute: "0"
        job: "/usr/bin/python3 {{ library_path }}/security/log_reporter.py"
